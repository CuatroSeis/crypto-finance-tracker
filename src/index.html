<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoTrack — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- NAVBAR -->
    <nav class="navbar">
    <div class="nav-logo">Crypto <span>I V A N</span></div>
    <ul class="nav-links">
        <li><a href="#" class="active" data-section="dashboard">Dashboard</a></li>
        <li><a href="#" data-section="portfolio">Portfolio</a></li>
        <li><a href="#" data-section="converter">Converter</a></li>
    </ul>
    <div class="nav-status">
        <span class="status-dot"></span>
        <span class="status-text">Live</span>
    </div>
    </nav>

<!-- MAIN -->
    <main class="main-container">

    <!-- STAT CARDS -->
    <section class="stats-grid">
        <div class="stat-card">
        <p class="stat-label">Market Cap</p>
        <h2 class="stat-value" id="market-cap">—</h2>
        <p class="stat-change" id="market-cap-change">—</p>
        </div>
        <div class="stat-card">
        <p class="stat-label">24h Volume</p>
        <h2 class="stat-value" id="volume">—</h2>
        <p class="stat-change" id="volume-change">—</p>
        </div>
        <div class="stat-card">
        <p class="stat-label">BTC Dominance</p>
        <h2 class="stat-value" id="btc-dominance">—</h2>
        <p class="stat-change" id="dominance-change">—</p>
        </div>
        <div class="stat-card">
        <p class="stat-label">Portfolio Value</p>
        <h2 class="stat-value" id="portfolio-total">$0.00</h2>
        <p class="stat-change" id="portfolio-change">—</p>
        </div>
    </section>

    <!-- GRID PRINCIPAL -->
    <div class="dashboard-grid">

    <!-- COLUMNA IZQUIERDA -->
        <div class="col-left">

        <!-- CHART -->
        <div class="glass-card chart-card">
            <div class="card-header">
            <h3 class="card-title">Precio histórico</h3>
            <div class="chart-controls">
                <button class="btn-period active" data-days="7">7D</button>
                <button class="btn-period" data-days="30">30D</button>
                <button class="btn-period" data-days="90">90D</button>
            </div>
            <select id="chart-coin-select">
                <option value="bitcoin">BTC</option>
                <option value="ethereum">ETH</option>
                <option value="solana">SOL</option>
            </select>
            </div>
            <div class="chart-wrapper">
            <canvas id="price-chart"></canvas>
            </div>
        </div>

        <!-- TABLA DE COINS -->
        <div class="glass-card">
            <h3 class="card-title">Top coins</h3>
            <div class="coin-list" id="coin-list">
            <!-- JS lo puebla -->
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
            <div class="skeleton-row"></div>
            </div>
        </div>

        </div>

    <!-- COLUMNA DERECHA -->
        <div class="col-right">

        <!-- PORTFOLIO -->
        <div class="glass-card">
            <h3 class="card-title">Mi portfolio</h3>
            <div class="portfolio-list" id="portfolio-list">
            <!-- JS lo puebla -->
            </div>
            <div class="portfolio-footer">
            <button class="btn-add" id="btn-add-asset">+ Agregar activo</button>
            </div>
        </div>

        <!-- CONVERTER -->
        <div class="glass-card">
            <h3 class="card-title">Convertidor</h3>
            <div class="converter">
            <div class="converter-row">
                <input type="number" id="conv-amount" value="1" min="0" />
                <select id="conv-from">
                <option value="bitcoin">BTC</option>
                <option value="ethereum">ETH</option>
                <option value="solana">SOL</option>
                </select>
            </div>
            <div class="converter-arrow">↕</div>
            <div class="converter-row">
                <p class="conv-result" id="conv-result">—</p>
                <select id="conv-to">
                <option value="usd">USD</option>
                <option value="eur">EUR</option>
                <option value="ars">ARS</option>
                </select>
            </div>
            <p class="conv-rate" id="conv-rate"></p>
            </di>
        </div>

        </div>
    </div>
    </main>

<!-- Chart.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<!-- Nuestros módulos -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
